<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>my_map-poi — достопримечательности Больцано–Верона</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body, #map { margin: 0; height: 100%; }
    body { font-family: system-ui, sans-serif; }
    #hud {
      position: absolute; z-index: 2; top: 10px; left: 10px; max-width: 240px;
      background: rgba(255,255,255,.94); padding: 8px 12px; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.25); font-size: 13px; line-height: 1.4;
    }
    #hud-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    #hud-head b { color: #b3541e; }
    #hud-toggle { background: none; border: 0; font-size: 15px; cursor: pointer; color: #888; padding: 0 2px; }
    #hud.collapsed #hud-body { display: none; }
    #hud.collapsed #hud-toggle { transform: rotate(-90deg); }
    #hud-sub { font-size: 11px; color: #888; }
    #legend { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
    .lg { display: flex; align-items: center; font-size: 12px; white-space: nowrap; cursor: pointer; user-select: none; }
    .lg i { width: 14px; text-align: center; margin-right: 5px; }
    .lg .dot { width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; border: 1px solid #fff; box-shadow: 0 0 0 .5px #aaa; flex: none; }
    .lg-ic { width: 18px; height: 18px; margin-right: 6px; flex: none; }
    .lg.off { opacity: .38; text-decoration: line-through; }
    /* карточка (общая для попапа и мобильной шторки) */
    .maplibregl-popup-content { max-width: 300px; padding: 12px 14px; }
    .card { font-size: 13px; line-height: 1.45; }
    .poi-photo { width: 100%; border-radius: 6px; display: block; }
    .poi-attr { font-size: 10px; color: #666; margin: 3px 0 8px; }
    .poi-attr a { color: #666; }
    .poi-site { font-size: 12px; margin: 4px 0 6px; }
    .poi-site a { color: #1a6; text-decoration: none; font-weight: 600; }
    .poi-name { font-weight: 700; font-size: 15px; }
    .poi-name-ru { font-size: 11px; color: #999; margin: 1px 0 2px; }
    .poi-cat { font-size: 11px; color: #666; margin: 2px 0; display: flex; align-items: center; }
    .poi-cat i { width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; display: inline-block; }
    .poi-desc { color: #555; font-style: italic; margin-bottom: 6px; }
    .poi-summary { margin: 6px 0; max-height: 14em; overflow-y: auto; overscroll-behavior: contain;
      padding-right: 4px; }
    .poi-links a { display: inline-block; margin-right: 10px; color: #1a6; text-decoration: none; font-weight: 600; }
    .poi-links a:hover { text-decoration: underline; }
    /* мобильная нижняя шторка */
    #sheet {
      position: absolute; z-index: 3; left: 0; right: 0; bottom: 0;
      background: #fff; border-radius: 14px 14px 0 0; box-shadow: 0 -2px 12px rgba(0,0,0,.25);
      max-height: 62vh; display: flex; flex-direction: column;
      transform: translateY(105%); transition: transform .25s ease; visibility: hidden;
    }
    #sheet.open { transform: translateY(0); visibility: visible; }
    #sheet-grip { width: 40px; height: 4px; border-radius: 2px; background: #ccc; margin: 8px auto 2px; flex: none; }
    #sheet-close { position: absolute; top: 8px; right: 12px; background: none; border: 0; font-size: 22px;
      line-height: 1; color: #888; cursor: pointer; z-index: 1; }
    #sheet-body { overflow-y: auto; padding: 6px 16px 20px; }
    #sheet-body .poi-summary { max-height: none; overflow: visible; } /* шторка скроллится сама */
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hud">
    <div id="hud-head"><b>my_map-poi</b><button id="hud-toggle" title="Свернуть">▾</button></div>
    <div id="hud-body">
      <div id="hud-sub">пилот Больцано–Верона</div>
      <label style="display:block;margin:6px 0 2px">Плотность точек
        <input type="range" id="density" min="0" max="11" step="0.5" value="3" style="width:100%" />
        <span style="display:flex;justify-content:space-between;font-size:10px;color:#888"><span>меньше</span><span>больше</span></span>
      </label>
      <span id="count">загрузка…</span>
      <div id="legend"></div>
    </div>
  </div>
  <div id="sheet"><div id="sheet-grip"></div><button id="sheet-close" title="Закрыть">×</button><div id="sheet-body"></div></div>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script>
  (async function () {
    const scoring = await fetch('config/scoring.json').then((r) => r.json()).catch(() => ({}));
    const RELIGIOUS_MIN = scoring.religiousMinScore ?? 7;
    const poiTypes = await fetch('config/poi-types.json').then((r) => r.json()).catch(() => ({ categories: {} }));
    const CATEGORIES = poiTypes.categories || {};

    const isMobile = () => window.matchMedia('(max-width: 640px)').matches;

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [11.1, 45.95],
      zoom: 8,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    // GPS-геолокация (как в my_map-toll).
    map.addControl(new maplibregl.GeolocateControl({
      positionOptions: { enableHighAccuracy: true },
      trackUserLocation: true,
      showUserHeading: true,
    }), 'top-right');
    window.poiMap = map;

    // Сворачивание HUD (для мобильной версии).
    document.getElementById('hud-toggle').addEventListener('click', () => {
      document.getElementById('hud').classList.toggle('collapsed');
    });

    map.on('load', async () => {
      const data = await fetch('data/normalized/bolzano-verona.geojson').then(r => r.json());

      map.addSource('poi', { type: 'geojson', data });

      // Маркер: заливной цветной кружок (категория) + белый лаконичный глиф (canvas-фигуры,
      // не эмодзи — читаемо и на мелком размере). Symbol-слой нужен для коллизий.
      const ratio = 2;
      function drawGlyph(ctx, cat, cx, cy, h) {
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#fff'; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        if (cat === 'religion') { // крест
          const w = h * 0.3;
          ctx.fillRect(cx - w / 2, cy - h, w, h * 1.9);
          ctx.fillRect(cx - h * 0.6, cy - h * 0.35, h * 1.2, w);
        } else if (cat === 'fortress') { // башня с крупными зубцами
          const wall = h * 1.5, x0 = cx - wall / 2;
          ctx.fillRect(x0, cy - h * 0.05, wall, h * 0.9);
          const mw = wall * 0.26, gap = (wall - 3 * mw) / 2; // 3 зубца, 2 промежутка
          for (let k = 0; k < 3; k++) ctx.fillRect(x0 + k * (mw + gap), cy - h * 0.72, mw, h * 0.72);
        } else if (cat === 'museum') { // фронтон + колонны + база
          ctx.beginPath(); ctx.moveTo(cx - h, cy - h * 0.2); ctx.lineTo(cx, cy - h * 0.9); ctx.lineTo(cx + h, cy - h * 0.2); ctx.closePath(); ctx.fill();
          ctx.fillRect(cx - h, cy + h * 0.72, h * 2, h * 0.25);
          const cw = h * 0.2;
          [-h * 0.62, -cw / 2, h * 0.62 - cw].forEach((x) => ctx.fillRect(cx + x, cy - h * 0.05, cw, h * 0.72));
        } else if (cat === 'monument') { // звезда
          ctx.beginPath();
          for (let i = 0; i < 10; i++) { const rr = i % 2 ? h * 0.42 : h; const a = -Math.PI / 2 + i * Math.PI / 5; ctx.lineTo(cx + rr * Math.cos(a), cy + rr * Math.sin(a)); }
          ctx.closePath(); ctx.fill();
        } else if (cat === 'nature') { // гора (два пика)
          ctx.beginPath();
          ctx.moveTo(cx - h, cy + h * 0.75); ctx.lineTo(cx - h * 0.3, cy - h * 0.55);
          ctx.lineTo(cx + h * 0.05, cy + h * 0.15); ctx.lineTo(cx + h * 0.45, cy - h * 0.85);
          ctx.lineTo(cx + h, cy + h * 0.75); ctx.closePath(); ctx.fill();
        } else if (cat === 'leisure') { // воздушный шарик (развлечения)
          ctx.beginPath(); ctx.ellipse(cx, cy - h * 0.22, h * 0.6, h * 0.72, 0, 0, 2 * Math.PI); ctx.fill();
          // узелок
          ctx.beginPath(); ctx.moveTo(cx - h * 0.14, cy + h * 0.48); ctx.lineTo(cx + h * 0.14, cy + h * 0.48); ctx.lineTo(cx, cy + h * 0.66); ctx.closePath(); ctx.fill();
          // верёвочка
          ctx.lineWidth = h * 0.1; ctx.beginPath(); ctx.moveTo(cx, cy + h * 0.66); ctx.quadraticCurveTo(cx + h * 0.22, cy + h * 0.85, cx + h * 0.05, cy + h); ctx.stroke();
        } else { // прочее — точка
          ctx.beginPath(); ctx.arc(cx, cy, h * 0.45, 0, 2 * Math.PI); ctx.fill();
        }
      }
      function catIcon(color, cat) {
        const R = 12, s = R * 2 * ratio;
        const cv = document.createElement('canvas'); cv.width = cv.height = s;
        const ctx = cv.getContext('2d');
        ctx.beginPath(); ctx.arc(s / 2, s / 2, R * ratio - 1.5 * ratio, 0, 2 * Math.PI);
        ctx.fillStyle = color; ctx.fill();
        ctx.lineWidth = ratio; ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.stroke();
        drawGlyph(ctx, cat, s / 2, s / 2, R * ratio * 0.5);
        return ctx.getImageData(0, 0, s, s);
      }
      for (const [key, def] of Object.entries(CATEGORIES)) {
        map.addImage('poi-' + key, catIcon(def.color, key), { pixelRatio: ratio });
      }
      map.addImage('poi-other', catIcon('#9aa0a6', 'other'), { pixelRatio: ratio });

      // Тот же значок для легенды (data-URL), чтобы условные совпадали с маркерами.
      function iconDataUrl(color, cat) {
        const s = 40;
        const cv = document.createElement('canvas'); cv.width = cv.height = s;
        const ctx = cv.getContext('2d');
        ctx.beginPath(); ctx.arc(s / 2, s / 2, s / 2 - 2, 0, 2 * Math.PI);
        ctx.fillStyle = color; ctx.fill();
        ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.stroke();
        drawGlyph(ctx, cat, s / 2, s / 2, s / 2 * 0.52);
        return cv.toDataURL();
      }

      map.addLayer({
        id: 'poi',
        type: 'symbol',
        source: 'poi',
        layout: {
          'icon-image': ['concat', 'poi-', ['get', 'category']],
          // размер по популярности (pageviews_90d).
          'icon-size': ['interpolate', ['linear'], ['get', 'pageviews_90d'],
            0, 0.5, 100, 0.62, 1000, 0.82, 10000, 1.05, 50000, 1.4],
          'symbol-sort-key': ['-', 0, ['get', 'score']],
          'icon-padding': ['interpolate', ['linear'], ['zoom'], 5, 20, 10, 8, 14, 2, 16, 0],
          'icon-allow-overlap': ['step', ['zoom'], false, 16, true],
          'icon-ignore-placement': false,
        },
      });

      // Легенда — кликабельная: клик прячет/показывает категорию (коллизии перекладываются).
      const hidden = new Set();
      const legend = document.getElementById('legend');
      legend.innerHTML = Object.entries(CATEGORIES)
        .map(([key, def]) => `<span class="lg" data-cat="${key}"><img class="lg-ic" src="${iconDataUrl(def.color, key)}" alt="" />${def.label_ru}</span>`)
        .join('');
      legend.addEventListener('click', (e) => {
        const item = e.target.closest('.lg'); if (!item) return;
        const key = item.dataset.cat;
        if (hidden.has(key)) hidden.delete(key); else hidden.add(key);
        item.classList.toggle('off', hidden.has(key));
        applyFilters();
      });

      const religiousRule = ['any', ['!', ['get', 'is_religious']], ['>=', ['get', 'score'], RELIGIOUS_MIN]];
      const densityInput = document.getElementById('density');
      const countEl = document.getElementById('count');
      const SLIDER_MAX = Number(densityInput.max);

      function applyFilters() {
        const cutoff = SLIDER_MAX - Number(densityInput.value);
        const notHidden = ['!', ['in', ['get', 'category'], ['literal', [...hidden]]]];
        map.setFilter('poi', ['all', religiousRule, ['>=', ['get', 'score'], cutoff], notHidden]);
        const shown = data.features.filter((f) => {
          const p = f.properties;
          if (hidden.has(p.category)) return false;
          if (p.is_religious && p.score < RELIGIOUS_MIN) return false;
          return p.score >= cutoff;
        }).length;
        countEl.textContent = shown + ' из ' + data.features.length + ' объектов';
      }
      densityInput.addEventListener('input', applyFilters);
      applyFilters();

      // Клик по объекту: на десктопе — попап у точки, на мобильном — нижняя шторка.
      map.on('click', 'poi', (e) => {
        const p = e.features[0].properties;
        const [lon, lat] = e.features[0].geometry.coordinates;
        const html = cardHtml(p, lat, lon);
        if (isMobile()) {
          openSheet(html);
        } else {
          const popup = new maplibregl.Popup({ maxWidth: '300px' }).setLngLat([lon, lat]).setHTML(html).addTo(map);
          stopWheel(popup.getElement());
        }
      });
      map.on('mouseenter', 'poi', () => (map.getCanvas().style.cursor = 'pointer'));
      map.on('mouseleave', 'poi', () => (map.getCanvas().style.cursor = ''));
    });

    // Нижняя шторка (мобильная).
    const sheet = document.getElementById('sheet');
    const sheetBody = document.getElementById('sheet-body');
    function openSheet(html) { sheetBody.innerHTML = html; sheet.classList.add('open'); }
    document.getElementById('sheet-close').addEventListener('click', () => sheet.classList.remove('open'));

    // Чтобы прокрутка текста колесом не зумила карту.
    function stopWheel(el) {
      const s = el && el.querySelector('.poi-summary');
      if (s) s.addEventListener('wheel', (ev) => ev.stopPropagation(), { passive: true });
    }

    function cardHtml(p, lat, lon) {
      const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"]/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])));
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
      let html = '<div class="card">';
      if (p.image_url) {
        html += `<img class="poi-photo" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy" />`;
        const lic = p.img_license_url
          ? `<a href="${esc(p.img_license_url)}" target="_blank" rel="noopener">${esc(p.img_license)}</a>`
          : esc(p.img_license);
        html += `<div class="poi-attr">© ${esc(p.img_author)} · ${lic} · ` +
          `<a href="${esc(p.img_source)}" target="_blank" rel="noopener">Commons</a></div>`;
      }
      if (p.website) {
        let host = p.website; try { host = new URL(p.website).hostname.replace(/^www\./, ''); } catch {}
        html += `<div class="poi-site">🌐 <a href="${esc(p.website)}" target="_blank" rel="noopener">${esc(host)}</a></div>`;
      }
      html += `<div class="poi-name">${esc(p.name) || p.qid}</div>`;
      if (p.name_ru) html += `<div class="poi-name-ru">${esc(p.name_ru)}</div>`;
      const cat = CATEGORIES[p.category];
      if (cat) html += `<div class="poi-cat"><i style="background:${cat.color}"></i>${esc(cat.label_ru)}</div>`;
      if (p.description) html += `<div class="poi-desc">${esc(p.description)}</div>`;
      if (p.summary) html += `<div class="poi-summary">${esc(p.summary)}</div>`;
      html += '<div class="poi-links">';
      if (p.wiki_url) {
        const wl = (String(p.wiki_url).match(/https:\/\/([a-z-]+)\.wikipedia/) || [])[1];
        const hint = { ru: '', it: ' (ит.)', de: ' (нем.)', en: ' (англ.)' }[wl] ?? (wl ? ` (${wl})` : '');
        html += `<a href="${esc(p.wiki_url)}" target="_blank" rel="noopener">Wikipedia${hint} →</a>`;
      }
      html += `<a href="${mapsUrl}" target="_blank" rel="noopener">Google Maps →</a>`;
      html += '</div></div>';
      return html;
    }
  })();
  </script>
</body>
</html>
