<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>my_map-poi — достопримечательности Европы</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body, #map { margin: 0; height: 100%; }
    body { font-family: system-ui, sans-serif; }
    #hud { position: absolute; z-index: 2; top: 10px; left: 10px; max-width: 240px;
      background: rgba(255,255,255,.94); padding: 8px 12px; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.25); font-size: 13px; line-height: 1.4; }
    #hud-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    #hud-head b { color: #b3541e; }
    #hud-toggle { background: none; border: 0; font-size: 15px; cursor: pointer; color: #888; }
    #hud.collapsed #hud-body { display: none; }
    #hud.collapsed #hud-toggle { transform: rotate(-90deg); }
    #hud-sub { font-size: 11px; color: #888; }
    #legend { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
    .lg { display: flex; align-items: center; font-size: 12px; white-space: nowrap; cursor: pointer; user-select: none; }
    .lg-ic { width: 18px; height: 18px; margin-right: 6px; flex: none; }
    .lg.off { opacity: .38; text-decoration: line-through; }
    #about { margin-top: 8px; border-top: 1px solid #eee; padding-top: 6px; }
    #about-toggle { font-size: 11px; color: #888; text-decoration: none; }
    #about-body { font-size: 10px; color: #777; line-height: 1.55; margin-top: 5px; }
    #about-body a { color: #1a6; }
    .maplibregl-popup-content { max-width: 300px; padding: 12px 14px; }
    .card { font-size: 13px; line-height: 1.45; }
    .poi-photo { width: 100%; border-radius: 6px; display: block; }
    .poi-attr { font-size: 10px; color: #666; margin: 3px 0 8px; }
    .poi-attr a { color: #666; }
    .poi-site { font-size: 12px; margin: 0 0 5px; }
    .poi-site a { color: #1a6; text-decoration: none; font-weight: 600; }
    .poi-name { font-weight: 700; font-size: 15px; }
    .poi-name-ru { font-size: 11px; color: #999; margin: 1px 0 2px; }
    .poi-cat { font-size: 11px; color: #666; margin: 2px 0; display: flex; align-items: center; }
    .poi-cat i { width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; display: inline-block; }
    .poi-desc { color: #555; font-style: italic; margin: 4px 0 6px; }
    .poi-links a { display: inline-block; margin-right: 10px; color: #1a6; text-decoration: none; font-weight: 600; }
    #sheet { position: absolute; z-index: 3; left: 0; right: 0; bottom: 0; background: #fff;
      border-radius: 14px 14px 0 0; box-shadow: 0 -2px 12px rgba(0,0,0,.25); max-height: 60vh;
      display: flex; flex-direction: column; transform: translateY(105%); transition: transform .25s; visibility: hidden; }
    #sheet.open { transform: translateY(0); visibility: visible; }
    #sheet-grip { width: 40px; height: 4px; border-radius: 2px; background: #ccc; margin: 8px auto 2px; flex: none; }
    #sheet-close { position: absolute; top: 8px; right: 12px; background: none; border: 0; font-size: 22px; color: #888; cursor: pointer; }
    #sheet-body { overflow-y: auto; padding: 6px 16px 20px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hud">
    <div id="hud-head"><b>my_map-poi</b><button id="hud-toggle" title="Свернуть">▾</button></div>
    <div id="hud-body">
      <div id="hud-sub">достопримечательности Европы</div>
      <label style="display:block;margin:6px 0 2px">Плотность точек
        <input type="range" id="density" min="0" max="6" step="0.25" value="5" style="width:100%" />
        <span style="display:flex;justify-content:space-between;font-size:10px;color:#888"><span>меньше</span><span>больше</span></span>
      </label>
      <span id="count">загрузка…</span>
      <div id="zoom" style="font-size:11px;color:#b3541e;font-weight:600"></div>
      <div id="legend"></div>
      <div id="about"><a href="#" id="about-toggle">ⓘ О данных и правах</a><div id="about-body" hidden></div></div>
    </div>
  </div>
  <div id="sheet"><div id="sheet-grip"></div><button id="sheet-close" title="Закрыть">×</button><div id="sheet-body"></div></div>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
  <script>
  (async function () {
    const poiTypes = await fetch('config/poi-types.json').then((r) => r.json()).catch(() => ({ categories: {} }));
    const CATEGORIES = poiTypes.categories || {};
    const RELIGIOUS_MIN = 2;
    // PMTiles раздаётся с того же origin (GitHub Pages кладёт файл рядом — см. pages.yml).
    // Same-origin → без CORS; range-запросы Pages/Fastly поддерживает.
    const PMTILES = new URL('europe.pmtiles', location.href).href;
    const isMobile = () => window.matchMedia('(max-width: 640px)').matches;

    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: [10, 48], zoom: 4,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: true }), 'top-right');
    window.poiMap = map;
    document.getElementById('hud-toggle').addEventListener('click', () => document.getElementById('hud').classList.toggle('collapsed'));

    // Белый глиф на цветном кружке (canvas) — как в пилоте.
    const ratio = 2;
    function drawGlyph(ctx, cat, cx, cy, h) {
      ctx.fillStyle = '#fff'; ctx.strokeStyle = '#fff'; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      if (cat === 'religion') { const w = h * 0.3; ctx.fillRect(cx - w / 2, cy - h, w, h * 1.9); ctx.fillRect(cx - h * 0.6, cy - h * 0.35, h * 1.2, w); }
      else if (cat === 'fortress') { const wall = h * 1.5, x0 = cx - wall / 2; ctx.fillRect(x0, cy - h * 0.05, wall, h * 0.9); const mw = wall * 0.26, gap = (wall - 3 * mw) / 2; for (let k = 0; k < 3; k++) ctx.fillRect(x0 + k * (mw + gap), cy - h * 0.72, mw, h * 0.72); }
      else if (cat === 'museum') { ctx.beginPath(); ctx.moveTo(cx - h, cy - h * 0.2); ctx.lineTo(cx, cy - h * 0.9); ctx.lineTo(cx + h, cy - h * 0.2); ctx.closePath(); ctx.fill(); ctx.fillRect(cx - h, cy + h * 0.72, h * 2, h * 0.25); const cw = h * 0.2; [-h * 0.62, -cw / 2, h * 0.62 - cw].forEach((x) => ctx.fillRect(cx + x, cy - h * 0.05, cw, h * 0.72)); }
      else if (cat === 'monument') { ctx.beginPath(); for (let i = 0; i < 10; i++) { const rr = i % 2 ? h * 0.42 : h; const a = -Math.PI / 2 + i * Math.PI / 5; ctx.lineTo(cx + rr * Math.cos(a), cy + rr * Math.sin(a)); } ctx.closePath(); ctx.fill(); }
      else if (cat === 'nature') { ctx.beginPath(); ctx.moveTo(cx - h, cy + h * 0.75); ctx.lineTo(cx - h * 0.3, cy - h * 0.55); ctx.lineTo(cx + h * 0.05, cy + h * 0.15); ctx.lineTo(cx + h * 0.45, cy - h * 0.85); ctx.lineTo(cx + h, cy + h * 0.75); ctx.closePath(); ctx.fill(); }
      else if (cat === 'leisure') { ctx.beginPath(); ctx.ellipse(cx, cy - h * 0.22, h * 0.6, h * 0.72, 0, 0, 2 * Math.PI); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx - h * 0.14, cy + h * 0.48); ctx.lineTo(cx + h * 0.14, cy + h * 0.48); ctx.lineTo(cx, cy + h * 0.66); ctx.closePath(); ctx.fill(); ctx.lineWidth = h * 0.1; ctx.beginPath(); ctx.moveTo(cx, cy + h * 0.66); ctx.quadraticCurveTo(cx + h * 0.22, cy + h * 0.85, cx + h * 0.05, cy + h); ctx.stroke(); }
      else { ctx.beginPath(); ctx.arc(cx, cy, h * 0.45, 0, 2 * Math.PI); ctx.fill(); }
    }
    function catIcon(color, cat) {
      const R = 12, s = R * 2 * ratio;
      const cv = document.createElement('canvas'); cv.width = cv.height = s;
      const ctx = cv.getContext('2d');
      ctx.beginPath(); ctx.arc(s / 2, s / 2, R * ratio - 1.5 * ratio, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = ratio; ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.stroke();
      drawGlyph(ctx, cat, s / 2, s / 2, R * ratio * 0.5);
      return ctx.getImageData(0, 0, s, s);
    }
    function iconDataUrl(color, cat) {
      const s = 40; const cv = document.createElement('canvas'); cv.width = cv.height = s;
      const ctx = cv.getContext('2d');
      ctx.beginPath(); ctx.arc(s / 2, s / 2, s / 2 - 2, 0, 2 * Math.PI); ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.stroke();
      drawGlyph(ctx, cat, s / 2, s / 2, s / 2 * 0.52);
      return cv.toDataURL();
    }

    map.on('load', async () => {
      for (const [key, def] of Object.entries(CATEGORIES)) map.addImage('poi-' + key, catIcon(def.color, key), { pixelRatio: ratio });
      map.addImage('poi-other', catIcon('#9aa0a6', 'other'), { pixelRatio: ratio });

      map.addSource('poi', { type: 'vector', url: 'pmtiles://' + PMTILES });
      // Три яруса по значимости, чтобы точки появлялись равномерно, а не скачком на одном
      // зуме: важные раскрываются полностью раньше, остальные дозаполняются по мере зума
      // (до порога — коллизионное прореживание, поэтому в разреженных местах видно всё и так).
      const TIERS = [
        { id: 'poi-lo',  rule: ['<', ['get', 'sitelinks_count'], 2], overlapFrom: 12 },
        { id: 'poi-mid', rule: ['all', ['>=', ['get', 'sitelinks_count'], 2], ['<', ['get', 'sitelinks_count'], 6]], overlapFrom: 10 },
        { id: 'poi-hi',  rule: ['>=', ['get', 'sitelinks_count'], 6], overlapFrom: 9 },
      ];
      const LAYER_IDS = TIERS.map((t) => t.id);
      for (const t of TIERS) map.addLayer({
        id: t.id, type: 'symbol', source: 'poi', 'source-layer': 'poi',
        layout: {
          'icon-image': ['coalesce', ['image', ['concat', 'photo-', ['get', 'qid']]], ['image', ['concat', 'poi-', ['get', 'category']]]],
          // размер по числу Википедий (значимость); просмотры добавит enrich позже.
          'icon-size': ['interpolate', ['linear'], ['get', 'sitelinks_count'], 1, 0.62, 5, 0.8, 20, 1.0, 60, 1.3, 150, 1.6],
          'symbol-sort-key': ['-', 0, ['get', 'score']],
          'icon-padding': ['interpolate', ['linear'], ['zoom'], 4, 4, 7, 2, 10, 1, 12, 0],
          'icon-allow-overlap': ['step', ['zoom'], false, t.overlapFrom, true],
        },
      });

      // легенда со значками
      const hidden = new Set();
      document.getElementById('legend').innerHTML = Object.entries(CATEGORIES)
        .map(([key, def]) => `<span class="lg" data-cat="${key}"><img class="lg-ic" src="${iconDataUrl(def.color, key)}" alt="" />${def.label_ru}</span>`).join('');
      document.getElementById('legend').addEventListener('click', (e) => {
        const it = e.target.closest('.lg'); if (!it) return;
        const k = it.dataset.cat; hidden.has(k) ? hidden.delete(k) : hidden.add(k);
        it.classList.toggle('off', hidden.has(k)); applyFilters();
      });

      const densityInput = document.getElementById('density');
      const countEl = document.getElementById('count');
      const SLIDER_MAX = Number(densityInput.max);
      const religiousRule = ['any', ['!', ['==', ['get', 'category'], 'religion']], ['>=', ['get', 'score'], RELIGIOUS_MIN]];
      // Шкала слайдера → score-порог. Максимум порога 4.5 (а не 6): score=ln(sitelinks+1)+0.5×фото,
      // выше 4.5 (≈55+ Википедий) почти никого нет — раньше минимум слайдера давал пустую карту.
      const MAX_CUTOFF = 4.5;
      function applyFilters() {
        const cutoff = MAX_CUTOFF * (1 - Number(densityInput.value) / SLIDER_MAX);
        for (const t of TIERS) map.setFilter(t.id, ['all', t.rule, religiousRule, ['>=', ['get', 'score'], cutoff],
          ['!', ['in', ['get', 'category'], ['literal', [...hidden]]]]]);
      }
      densityInput.addEventListener('input', applyFilters);
      applyFilters();
      // счётчик — сколько сейчас в кадре (векторные тайлы не дают полный список).
      const meta = await fetch('europe-meta.json').then((r) => r.json()).catch(() => ({ count: 514747 }));
      const updateCount = () => { const n = map.queryRenderedFeatures({ layers: LAYER_IDS }).length; countEl.textContent = '≈ ' + n.toLocaleString('ru') + ' в кадре · всего ' + (meta.count || 0).toLocaleString('ru'); };
      map.on('idle', updateCount);
      // отладочный индикатор зума (живой, обновляется при движении карты)
      const zoomEl = document.getElementById('zoom');
      const updateZoom = () => { zoomEl.textContent = 'zoom ' + map.getZoom().toFixed(2); };
      map.on('move', updateZoom); updateZoom();

      // Фото-маркеры: для видимых объектов с thumb_url грузим круглое фото + кольцо (лениво, с запасом).
      const photoTried = new Set();
      function loadPhoto(qid, url, color) {
        if (photoTried.has(qid)) return; photoTried.add(qid);
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => { try {
          const S = 56 * ratio, r = S / 2 - 2.5 * ratio; const cv = document.createElement('canvas'); cv.width = cv.height = S; const ctx = cv.getContext('2d');
          ctx.save(); ctx.beginPath(); ctx.arc(S / 2, S / 2, r, 0, 2 * Math.PI); ctx.clip();
          const sc = Math.max(S / img.width, S / img.height); ctx.drawImage(img, (S - img.width * sc) / 2, (S - img.height * sc) / 2, img.width * sc, img.height * sc); ctx.restore();
          ctx.beginPath(); ctx.arc(S / 2, S / 2, r, 0, 2 * Math.PI); ctx.lineWidth = 3 * ratio; ctx.strokeStyle = color; ctx.stroke();
          if (!map.hasImage('photo-' + qid)) map.addImage('photo-' + qid, ctx.getImageData(0, 0, S, S), { pixelRatio: ratio });
        } catch (e) {} };
        img.src = url;
      }
      map.on('idle', () => {
        const feats = map.queryRenderedFeatures({ layers: LAYER_IDS }).filter((f) => f.properties.thumb_url);
        feats.sort((a, b) => b.properties.sitelinks_count - a.properties.sitelinks_count).slice(0, 120)
          .forEach((f) => loadPhoto(f.properties.qid, f.properties.thumb_url, (CATEGORIES[f.properties.category] || {}).color || '#9aa0a6'));
      });

      document.getElementById('about-body').innerHTML =
        `Обновлено: <b>${meta.built || '—'}</b> · объектов: ${(meta.count || 0).toLocaleString('ru')}<br>` +
        `Источники: Wikidata (CC0), тексты — Wikipedia (CC BY-SA).<br>Карта: © OpenFreeMap · © OpenStreetMap.<br>` +
        `<a href="https://github.com/misht-world/my_map-poi" target="_blank" rel="noopener">Исходный код</a>`;
      document.getElementById('about-toggle').addEventListener('click', (e) => { e.preventDefault(); const b = document.getElementById('about-body'); b.hidden = !b.hidden; });

      for (const lid of LAYER_IDS) {
        map.on('click', lid, (e) => {
          const p = e.features[0].properties;
          const [lon, lat] = e.features[0].geometry.coordinates;
          const html = cardHtml(p, lat, lon);
          if (isMobile()) { document.getElementById('sheet-body').innerHTML = html; document.getElementById('sheet').classList.add('open'); }
          else new maplibregl.Popup({ maxWidth: '300px' }).setLngLat([lon, lat]).setHTML(html).addTo(map);
        });
        map.on('mouseenter', lid, () => (map.getCanvas().style.cursor = 'pointer'));
        map.on('mouseleave', lid, () => (map.getCanvas().style.cursor = ''));
      }
    });
    document.getElementById('sheet-close').addEventListener('click', () => document.getElementById('sheet').classList.remove('open'));

    function cardHtml(p, lat, lon) {
      const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])));
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
      let html = '<div class="card">';
      if (p.image_url) {
        html += `<img class="poi-photo" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy" />`;
        const lic = p.img_license_url
          ? `<a href="${esc(p.img_license_url)}" target="_blank" rel="noopener">${esc(p.img_license)}</a>`
          : esc(p.img_license);
        html += `<div class="poi-attr">© ${esc(p.img_author)} · ${lic} · <a href="${esc(p.img_source)}" target="_blank" rel="noopener">Commons</a></div>`;
      }
      if (p.website) { let host = p.website; try { host = new URL(p.website).hostname.replace(/^www\./, ''); } catch {} html += `<div class="poi-site">🌐 <a href="${esc(p.website)}" target="_blank" rel="noopener">${esc(host)}</a></div>`; }
      html += `<div class="poi-name">${esc(p.name) || p.qid}</div>`;
      if (p.name_ru) html += `<div class="poi-name-ru">${esc(p.name_ru)}</div>`;
      const cat = CATEGORIES[p.category];
      if (cat) html += `<div class="poi-cat"><i style="background:${cat.color}"></i>${esc(cat.label_ru)}</div>`;
      if (p.description) html += `<div class="poi-desc">${esc(p.description)}</div>`;
      if (p.summary) html += `<div class="poi-summary" style="max-height:14em;overflow-y:auto;margin:6px 0">${esc(p.summary)}</div>`;
      html += '<div class="poi-links">';
      if (p.wiki_url) { const wl = (String(p.wiki_url).match(/https:\/\/([a-z-]+)\.wikipedia/) || [])[1]; const hint = { ru: ' (рус.)', it: ' (ит.)', de: ' (нем.)', en: ' (англ.)' }[wl] ?? (wl ? ` (${wl})` : ''); html += `<a href="${esc(p.wiki_url)}" target="_blank" rel="noopener">Wikipedia${hint} →</a>`; }
      html += `<a href="${mapsUrl}" target="_blank" rel="noopener">Google Maps →</a></div></div>`;
      return html;
    }
  })();
  </script>
</body>
</html>
